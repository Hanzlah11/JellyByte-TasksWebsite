<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projects — Sanctum</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0608; --surface: #120b0f; --surface2: #1a0f14; --surface3: #221419;
  --border: rgba(220,50,100,0.1); --border2: rgba(220,50,100,0.2);
  --primary: #e8185a; --primary-dim: rgba(232,24,90,0.12); --primary-glow: rgba(232,24,90,0.3);
  --primary-bright: #ff3575; --magenta: #c8186a; --pink: #ff6ba8; --accent: #ff9ecb;
  --green: #3ecf72; --green-dim: rgba(62,207,114,0.12); --yellow: #f0c050;
  --blue: #4a9eff; --red: #ff4444;
  --text: #f0e0e8; --text2: #c0a0b0; --muted: #6a4a58; --muted2: #2a1520; --muted3: #3a1e28;
  --gold: var(--primary-bright); --gold-dim: var(--primary-dim); --purple: var(--pink);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 15% 0%,rgba(232,24,90,0.08) 0%,transparent 55%),radial-gradient(ellipse at 85% 100%,rgba(200,24,106,0.06) 0%,transparent 55%);pointer-events:none;z-index:0;}

#global-nav{position:fixed;top:0;left:0;right:0;height:58px;background:rgba(10,6,8,0.96);border-bottom:1px solid var(--border2);display:flex;align-items:center;z-index:9000;padding:0 24px;backdrop-filter:blur(16px);}
.nav-logo{display:flex;align-items:center;gap:10px;margin-right:32px;flex-shrink:0;text-decoration:none;}
.nav-logo-cube{width:28px;height:28px;background:linear-gradient(135deg,var(--primary),var(--magenta));clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);display:flex;align-items:center;justify-content:center;font-size:0.6rem;color:#fff;font-weight:700;box-shadow:0 0 16px var(--primary-glow);animation:logoGlow 3s ease-in-out infinite;}
@keyframes logoGlow{0%,100%{box-shadow:0 0 12px var(--primary-glow);}50%{box-shadow:0 0 24px var(--primary-glow),0 0 40px rgba(232,24,90,0.15);}}
.nav-logo-text{font-family:'Syne',sans-serif;font-size:0.78rem;font-weight:800;letter-spacing:3px;background:linear-gradient(90deg,var(--primary-bright),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.nav-links{display:flex;align-items:center;gap:2px;flex:1;}
.nav-link{display:flex;align-items:center;gap:6px;padding:7px 14px;text-decoration:none;color:var(--muted);font-size:0.68rem;letter-spacing:2px;text-transform:uppercase;border:1px solid transparent;transition:all 0.2s;border-radius:2px;}
.nav-link:hover{color:var(--text2);border-color:var(--border);background:var(--primary-dim);}
.nav-link.active{color:var(--primary-bright);border-color:var(--border2);background:var(--primary-dim);}
.nav-clock{font-size:0.82rem;color:var(--muted);letter-spacing:3px;margin-left:auto;font-variant-numeric:tabular-nums;}

.page{position:relative;z-index:1;max-width:1080px;margin:0 auto;padding:82px 20px 60px;}
.page-header{margin-bottom:24px;display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.page-title{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-0.5px;}
.page-sub{font-size:0.62rem;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-top:4px;}

.btn-gold{background:linear-gradient(135deg,var(--primary),var(--magenta));border:none;color:#fff;font-family:'JetBrains Mono',monospace;font-size:0.72rem;letter-spacing:3px;text-transform:uppercase;padding:10px 20px;cursor:pointer;transition:all 0.2s;}
.btn-gold:hover{box-shadow:0 0 24px var(--primary-glow);}
.btn-gold:disabled{background:var(--muted2);color:var(--muted);cursor:not-allowed;}
.btn-sm{background:none;border:1px solid var(--muted2);color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:0.62rem;letter-spacing:2px;text-transform:uppercase;padding:6px 12px;cursor:pointer;transition:all 0.2s;}
.btn-sm:hover{border-color:var(--primary);color:var(--primary-bright);}
.btn-danger{background:none;border:1px solid rgba(192,80,74,0.3);color:var(--red);font-family:'JetBrains Mono',monospace;font-size:0.62rem;letter-spacing:2px;text-transform:uppercase;padding:6px 12px;cursor:pointer;transition:all 0.2s;}
.btn-danger:hover{border-color:var(--red);background:rgba(192,80,74,0.08);}

.limit-bar{background:var(--surface);border:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:12px;margin-bottom:20px;}
.limit-text{font-size:0.65rem;letter-spacing:2px;color:var(--muted);}
.limit-dots{display:flex;gap:4px;}
.limit-dot{width:8px;height:8px;border-radius:50%;background:var(--muted2);}
.limit-dot.used{background:var(--gold);}

/* PROJECTS LIST */
.projects-grid{display:grid;grid-template-columns:1fr;gap:16px;}

.project-card{background:var(--surface);border:1px solid var(--border2);border-top:3px solid var(--primary);padding:0;overflow:hidden;transition:box-shadow 0.2s;}
.project-card:hover{box-shadow:0 4px 24px rgba(0,0,0,0.4);}

.proj-header{padding:18px 20px 14px;display:flex;align-items:flex-start;gap:12px;cursor:pointer;}
.proj-info{flex:1;}
.proj-name{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;color:var(--primary-bright);letter-spacing:2px;margin-bottom:4px;}
.proj-meta{font-size:0.62rem;letter-spacing:2px;color:var(--muted);text-transform:uppercase;}
.proj-actions{display:flex;gap:6px;flex-shrink:0;}

/* PROGRESS */
.proj-progress{padding:0 20px 14px;}
.prog-labels{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.prog-pct{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;color:var(--primary-bright);}
.prog-tasks{font-size:0.6rem;letter-spacing:2px;color:var(--muted);}
.prog-bar-bg{background:var(--muted2);height:4px;border-radius:2px;overflow:hidden;}
.prog-bar-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--pink));transition:width 0.5s ease;border-radius:2px;}

/* TIMELINE */
.proj-body{border-top:1px solid var(--border);padding:16px 20px;display:none;}
.proj-body.open{display:block;}

.timeline-hdr{font-size:0.58rem;letter-spacing:4px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.timeline-hdr::after{content:'';flex:1;height:1px;background:var(--border);}

/* Visual timeline bar */
.timeline-bar{position:relative;height:32px;background:var(--muted2);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.timeline-segment{position:absolute;top:0;height:100%;display:flex;align-items:center;padding:0 6px;font-size:0.58rem;color:rgba(255,255,255,0.8);overflow:hidden;white-space:nowrap;transition:all 0.3s;}

/* Task list */
.task-list{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.tl-task{display:grid;grid-template-columns:20px 1fr auto auto auto;gap:10px;align-items:center;background:var(--surface2);border:1px solid var(--border);padding:10px 12px;}
.tl-check{width:16px;height:16px;border:1px solid var(--muted2);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s;}
.tl-check.done{background:var(--green);border-color:var(--green);}
.tl-check.done::after{content:'✓';font-size:0.6rem;color:#08080c;}
.tl-name{font-size:0.85rem;}
.tl-name.done{text-decoration:line-through;opacity:0.4;}
.tl-dur{font-size:0.62rem;color:var(--muted);letter-spacing:1px;}
.tl-del{background:none;border:none;color:var(--muted2);cursor:pointer;font-size:0.75rem;padding:2px 4px;transition:color 0.15s;}
.tl-del:hover{color:var(--red);}

/* Add task row */
.add-task-row{display:grid;grid-template-columns:1fr 120px auto;gap:8px;align-items:center;}
.inp{width:100%;background:var(--bg);border:1px solid var(--muted2);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:0.82rem;padding:8px 10px;outline:none;transition:border-color 0.2s;}
.inp:focus{border-color:var(--gold);}
.inp::placeholder{color:var(--muted);}
.btn-add-task{background:var(--gold);border:none;color:#08080c;font-family:'JetBrains Mono',monospace;font-size:0.65rem;letter-spacing:2px;padding:8px 14px;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
.btn-add-task:hover{background:#dfc080;}

/* NEW PROJECT MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:8000;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.show{display:flex;}
.modal{background:var(--surface);border:1px solid rgba(200,169,110,0.2);padding:28px;width:100%;max-width:420px;}
.modal-title{font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;color:var(--gold);letter-spacing:3px;margin-bottom:20px;}
.field{margin-bottom:12px;}
.field label{display:block;font-size:0.58rem;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
.field input,.field select{width:100%;background:var(--bg);border:1px solid var(--muted2);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:0.88rem;padding:9px 11px;outline:none;transition:border-color 0.2s;}
.field input:focus{border-color:var(--gold);}
.field input::placeholder{color:var(--muted);}
.modal-actions{display:flex;gap:8px;margin-top:20px;}
.btn-primary{flex:1;background:var(--gold);border:none;color:#08080c;font-family:'JetBrains Mono',monospace;font-size:0.72rem;letter-spacing:3px;text-transform:uppercase;padding:10px;cursor:pointer;}
.btn-primary:hover{background:#dfc080;}
.btn-cancel{flex:1;background:none;border:1px solid var(--muted2);color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:0.72rem;letter-spacing:2px;text-transform:uppercase;padding:10px;cursor:pointer;}
.btn-cancel:hover{border-color:var(--muted);color:var(--text);}

.empty-state{text-align:center;padding:60px 20px;color:var(--muted);font-size:0.7rem;letter-spacing:3px;}

#toast{position:fixed;bottom:24px;right:24px;background:var(--surface);border:1px solid var(--gold);color:var(--gold);font-family:'JetBrains Mono',monospace;font-size:0.7rem;letter-spacing:2px;padding:11px 18px;z-index:9999;transform:translateY(60px);opacity:0;transition:all 0.3s;}
#toast.show{transform:translateY(0);opacity:1;}
</style>
</head>
<body>

<nav id="global-nav">
  <a href="tasks.html" class="nav-logo">
    <div class="nav-logo-cube">JB</div>
    <span class="nav-logo-text">JELLYBYTE STUDIOS</span>
  </a>
  <div class="nav-links">
    <a href="tasks.html" class="nav-link"><span>⚡</span><span>Daily Tasks</span></a>
    <a href="timetable.html" class="nav-link"><span>📅</span><span>Week Table</span></a>
    <a href="projects.html" class="nav-link active"><span>🚀</span><span>Projects</span></a>
    <a href="boards.html" class="nav-link"><span>🗂</span><span>Boards</span></a>
  </div>
  <div class="nav-clock" id="nav-clock">--:--</div>
</nav>

<div class="page">
  <div class="page-header">
    <div>
      <div class="page-title">Projects</div>
      <div class="page-sub">// Max 10 active projects</div>
    </div>
    <button class="btn-gold" id="btn-new-proj" onclick="openNewModal()">＋ New Project</button>
  </div>

  <div class="limit-bar">
    <span class="limit-text">SLOTS USED:</span>
    <div class="limit-dots" id="limit-dots"></div>
    <span class="limit-text" id="limit-count">0 / 10</span>
  </div>

  <div class="projects-grid" id="projects-grid">
    <div class="empty-state">[ No projects yet ]<br><br>Create your first project above.</div>
  </div>
</div>

<!-- NEW PROJECT MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title">New Project</div>
    <div class="field"><label>Project Name</label><input type="text" id="m-name" placeholder="e.g. OS Project" maxlength="50"></div>
    <div class="field"><label>Start Date</label><input type="date" id="m-start"></div>
    <div class="field"><label>End Date (Deadline)</label><input type="date" id="m-end"></div>
    <div class="field"><label>Color Accent</label>
      <select id="m-color">
        <option value="#c8a96e">Gold</option>
        <option value="#5b8fc9">Blue</option>
        <option value="#4caf82">Green</option>
        <option value="#a07dd0">Purple</option>
        <option value="#c0504a">Red</option>
        <option value="#5bc9c0">Teal</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-primary" onclick="createProject()">Create</button>
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const SK='sanctum_projects';
let projects=JSON.parse(localStorage.getItem(SK)||'[]');
function save(){localStorage.setItem(SK,JSON.stringify(projects));}

function pad(n){return String(n).padStart(2,'0');}
function setInterval2(){const n=new Date();document.getElementById('nav-clock').textContent=`${pad(n.getHours())}:${pad(n.getMinutes())}`;}
setInterval(setInterval2,1000);setInterval2();

function openNewModal(){
  if(projects.length>=10){toast('Max 10 projects reached');return;}
  const today=new Date().toISOString().slice(0,10);
  document.getElementById('m-name').value='';
  document.getElementById('m-start').value=today;
  document.getElementById('m-end').value='';
  document.getElementById('modal').classList.add('show');
  setTimeout(()=>document.getElementById('m-name').focus(),100);
}
function closeModal(){document.getElementById('modal').classList.remove('show');}

function createProject(){
  const name=document.getElementById('m-name').value.trim();
  const start=document.getElementById('m-start').value;
  const end=document.getElementById('m-end').value;
  const color=document.getElementById('m-color').value;
  if(!name){toast('Enter a project name');return;}
  if(!start||!end){toast('Set start and end dates');return;}
  if(end<=start){toast('End must be after start');return;}
  projects.push({id:Date.now(),name,start,end,color,tasks:[],open:true});
  save();renderAll();closeModal();toast('Project created ✓');
}

function deleteProject(id){
  if(!confirm('Delete this project and all its tasks?'))return;
  projects=projects.filter(p=>p.id!==id);
  save();renderAll();toast('Project deleted');
}

function toggleProject(id){
  const p=projects.find(p=>p.id===id);
  if(p)p.open=!p.open;
  save();renderAll();
}

function addTask(pid){
  const inp=document.getElementById(`task-inp-${pid}`);
  const dur=document.getElementById(`task-dur-${pid}`);
  const name=inp.value.trim();
  const duration=dur.value.trim()||'—';
  if(!name){toast('Enter a task name');return;}
  const p=projects.find(p=>p.id===pid);
  if(!p)return;
  p.tasks.push({id:Date.now(),name,duration,done:false});
  save();renderAll();inp.value='';toast('Task added ✓');
}

function toggleTask(pid,tid){
  const p=projects.find(p=>p.id===pid);
  if(!p)return;
  const t=p.tasks.find(t=>t.id===tid);
  if(t){t.done=!t.done;save();renderAll();}
}

function delTask(pid,tid){
  const p=projects.find(p=>p.id===pid);
  if(!p)return;
  p.tasks=p.tasks.filter(t=>t.id!==tid);
  save();renderAll();
}

function daysLeft(end){
  const d=Math.ceil((new Date(end)-new Date())/86400000);
  if(d<0)return`<span style="color:var(--red)">${Math.abs(d)}d overdue</span>`;
  if(d===0)return`<span style="color:var(--red)">Due today!</span>`;
  return`${d}d left`;
}

function timelineSegs(p){
  if(!p.tasks.length)return'<div style="position:absolute;inset:0;display:flex;align-items:center;padding:0 8px;font-size:0.58rem;color:var(--muted);letter-spacing:2px;">No tasks yet</div>';
  const start=new Date(p.start).getTime();
  const end=new Date(p.end).getTime();
  const total=end-start;
  const segW=100/Math.max(p.tasks.length,1);
  const colors=['#5b8fc9','#4caf82','#c8a96e','#a07dd0','#c0504a','#5bc9c0','#d4a84b'];
  return p.tasks.map((t,i)=>{
    const col=colors[i%colors.length];
    const opacity=t.done?0.4:1;
    return`<div class="timeline-segment" style="left:${i*segW}%;width:${segW}%;background:${col}${t.done?'44':'88'};opacity:${opacity};">${esc(t.name)}</div>`;
  }).join('');
}

function renderAll(){
  // limit dots
  const dots=document.getElementById('limit-dots');
  dots.innerHTML=Array.from({length:10},(_,i)=>`<div class="limit-dot${i<projects.length?' used':''}"></div>`).join('');
  document.getElementById('limit-count').textContent=`${projects.length} / 10`;
  const btn=document.getElementById('btn-new-proj');
  btn.disabled=projects.length>=10;

  const grid=document.getElementById('projects-grid');
  if(!projects.length){grid.innerHTML='<div class="empty-state">[ No projects yet ]<br><br>Create your first project above.</div>';return;}

  grid.innerHTML=projects.map(p=>{
    const done=p.tasks.filter(t=>t.done).length;
    const total=p.tasks.length;
    const pct=total?Math.round(done/total*100):0;
    return`
    <div class="project-card" style="border-top-color:${p.color}">
      <div class="proj-header" onclick="toggleProject(${p.id})">
        <div class="proj-info">
          <div class="proj-name">${esc(p.name)}</div>
          <div class="proj-meta">${p.start} → ${p.end} &nbsp;·&nbsp; ${daysLeft(p.end)}</div>
        </div>
        <div class="proj-actions" onclick="event.stopPropagation()">
          <button class="btn-sm" onclick="toggleProject(${p.id})">${p.open?'▲ Hide':'▼ Show'}</button>
          <button class="btn-danger" onclick="deleteProject(${p.id})">Delete</button>
        </div>
      </div>
      <div class="proj-progress">
        <div class="prog-labels">
          <span class="prog-pct">${pct}%</span>
          <span class="prog-tasks">${done}/${total} tasks complete</span>
        </div>
        <div class="prog-bar-bg"><div class="prog-bar-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="proj-body${p.open?' open':''}">
        <div class="timeline-hdr">// Timeline</div>
        <div class="timeline-bar">${timelineSegs(p)}</div>
        <div class="timeline-hdr">// Tasks</div>
        <div class="task-list">${p.tasks.length?p.tasks.map(t=>`
          <div class="tl-task">
            <div class="tl-check${t.done?' done':''}" onclick="toggleTask(${p.id},${t.id})"></div>
            <div class="tl-name${t.done?' done':''}">${esc(t.name)}</div>
            <div class="tl-dur">${esc(t.duration)}</div>
            <button class="tl-del" onclick="delTask(${p.id},${t.id})">✕</button>
          </div>`).join(''):'<div style="font-size:0.68rem;color:var(--muted);letter-spacing:2px;padding:8px 0;">No tasks yet</div>'}
        </div>
        <div class="add-task-row">
          <input class="inp" id="task-inp-${p.id}" type="text" placeholder="Add task…" maxlength="60" onkeydown="if(event.key==='Enter')addTask(${p.id})">
          <input class="inp" id="task-dur-${p.id}" type="text" placeholder="e.g. 2 days" maxlength="20">
          <button class="btn-add-task" onclick="addTask(${p.id})">＋ Add</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2400);}

document.getElementById('m-name').addEventListener('keydown',e=>{if(e.key==='Enter')createProject();});
renderAll();
</script>
</body>
</html>
